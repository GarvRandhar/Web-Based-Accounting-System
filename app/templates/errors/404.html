<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div
        style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--background-color, #f8f9fb);">
        <div style="text-align: center; padding: 3rem;">
            <div
                style="font-size: 5rem; font-weight: 700; color: var(--primary-color, #2c5cc5); margin-bottom: 0.5rem;">
                404</div>
            <h1
                style="font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--text-primary, #1e293b);">
                Page Not Found</h1>
            <p style="color: var(--text-secondary, #64748b); margin-bottom: 2rem; max-width: 400px;">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <a href="/"
                style="display: inline-block; padding: 0.625rem 1.5rem; background: var(--primary-color, #2c5cc5); color: #fff; border-radius: 6px; text-decoration: none; font-weight: 500; font-size: 0.9rem;">
                Back to Dashboard
            </a>
        </div>
    </div>
</body>

</html>
